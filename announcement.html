<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencapaian - Ponpes Al Kautsar</title>
    <style>
        body { font-family: Arial; background: #eef2f7; padding: 20px; margin:0; }
        .container { max-width: 700px; margin: auto; background: white; border-radius: 28px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e2a47; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; }
        button { background: #1e2a47; color: white; font-weight: bold; cursor: pointer; }
        .logout-btn { background: #e67e22; margin-top: 0; }
        .announcement-card { background: #fef9e6; border-left: 5px solid #e67e22; margin: 15px 0; padding: 15px; border-radius: 16px; }
        .nav-links { text-align: center; margin-bottom: 20px; }
        .nav-links a { margin: 0 10px; text-decoration: none; color: #1e2a47; font-weight: bold; }
        hr { margin: 20px 0; }
        .admin-form { background: #f0f2f5; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-links">
        <a href="index.html">💬 Chat</a> | 
        <a href="infak.html">💰 Infak</a> | 
        <a href="announcement.html">🏆 Pencapaian</a>
    </div>
    <h2>🏆 Pemberitahuan Pencapaian</h2>
    <div id="userInfo" style="text-align:center; margin-bottom:15px;"></div>

    <!-- Form buat pengumuman (untuk semua user) -->
    <div id="adminForm" class="admin-form">
        <h3>Buat Pengumuman Baru</h3>
        <input type="text" id="title" placeholder="Judul (contoh: Juara 1 MHQ)">
        <textarea id="description" rows="3" placeholder="Deskripsi prestasi..."></textarea>
        <select id="target">
            <option value="all">Semua Santri</option>
            <option value="me">Hanya untuk saya (testing)</option>
        </select>
        <button onclick="createAnnouncement()">Kirim Pengumuman</button>
        <div id="formMessage" style="text-align:center;"></div>
    </div>

    <hr>
    <h3>📢 Daftar Pengumuman</h3>
    <div id="announcementsList"></div>

    <button class="logout-btn" onclick="logout()">Keluar</button>
</div>

<script src="https://unpkg.com/parse@3.4.0/dist/parse.min.js"></script>
<script>
    // GANTI DENGAN APPLICATION ID DAN JAVASCRIPT KEY ANDA
    Parse.initialize("PUkWc1q1w6G9LObKVAM8vaZysalll29RGM6hUsCN", "rYurvOuqkeJzJZfT1Tq1X5UmbSQHC6StID85xCu7");
    Parse.serverURL = "https://parseapi.back4app.com/";

    let currentUser = null;

    async function checkLogin() {
        const user = Parse.User.current();
        if (!user) {
            alert("Anda belum login. Silakan login dulu di halaman Chat.");
            window.location.href = "index.html";
            return;
        }
        currentUser = user;
        document.getElementById("userInfo").innerHTML = `👤 ${user.get("username")}`;
        await loadAnnouncements();
    }

    async function createAnnouncement() {
        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const target = document.getElementById("target").value;
        if (!title || !description) {
            alert("Judul dan deskripsi harus diisi.");
            return;
        }
        const Announcement = Parse.Object.extend("Announcement");
        const ann = new Announcement();
        ann.set("title", title);
        ann.set("description", description);
        ann.set("createdBy", currentUser.get("username"));
        if (target === "all") {
            ann.set("forAll", true);
            ann.set("targetUserId", null);
        } else {
            ann.set("forAll", false);
            ann.set("targetUserId", currentUser.id);
        }
        try {
            await ann.save();
            document.getElementById("formMessage").innerHTML = "✅ Pengumuman terkirim!";
            document.getElementById("title").value = "";
            document.getElementById("description").value = "";
            await loadAnnouncements();
            setTimeout(() => document.getElementById("formMessage").innerHTML = "", 3000);
        } catch (err) {
            document.getElementById("formMessage").innerHTML = "❌ Gagal: " + err.message;
        }
    }

    async function loadAnnouncements() {
        const Announcement = Parse.Object.extend("Announcement");
        const q1 = new Parse.Query(Announcement);
        q1.equalTo("forAll", true);
        const q2 = new Parse.Query(Announcement);
        q2.equalTo("targetUserId", currentUser.id);
        const mainQuery = Parse.Query.or(q1, q2);
        mainQuery.descending("createdAt");
        const results = await mainQuery.find();
        const container = document.getElementById("announcementsList");
        if (results.length === 0) {
            container.innerHTML = "<p>Belum ada pengumuman.</p>";
            return;
        }
        let html = "";
        for (let a of results) {
            const date = new Date(a.createdAt).toLocaleDateString("id-ID");
            html += `
                <div class="announcement-card">
                    <h3>🏅 ${escapeHtml(a.get("title"))}</h3>
                    <p>${escapeHtml(a.get("description"))}</p>
                    <small>Diumumkan oleh: ${escapeHtml(a.get("createdBy"))} | ${date}</small>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHtml(s) {
        if (!s) return "";
        return s.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }

    async function logout() {
        await Parse.User.logOut();
        window.location.href = "index.html";
    }

    window.onload = checkLogin;
</script>
</body>
  </html>
