<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chat - Ponpes Al Kautsar</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        h2 {
            text-align: center;
            color: #1e2a47;
            background: #fff;
            margin: 0;
            padding: 20px 0 10px;
            font-size: 1.6rem;
        }
        .sub {
            text-align: center;
            color: #2c5a2e;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        #login-area, #chat-area {
            padding: 20px;
        }
        .visible {
            display: block !important;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 40px;
            border: 1px solid #ccc;
            font-size: 16px;
            background: #fafafa;
        }
        button {
            background: #1e2a47;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        .btn-outline {
            background: #e67e22;
            margin-top: 0;
        }
        .message {
            background: #f8f9fa;
            margin-bottom: 12px;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .message strong {
            color: #1e2a47;
        }
        #message-box {
            height: 450px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .flex-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .logout-btn {
            background: #e67e22;
            width: auto;
            padding: 6px 18px;
            font-size: 14px;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
        hr {
            margin: 15px 0;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: gray;
            padding: 15px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>💬 Pondok Pesantren Al Kautsar</h2>
    <div class="sub">Forum Komunikasi Santri</div>

    <!-- AREA LOGIN / REGISTER -->
    <div id="login-area" class="visible">
        <input type="text" id="username" placeholder="Username (nama santri)" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        <button onclick="register()">Daftar</button>
        <button class="btn-outline" onclick="login()">Masuk</button>
        <div id="login-message" class="error-msg"></div>
    </div>

    <!-- AREA CHAT -->
    <div id="chat-area" style="display:none;">
        <div class="flex-row">
            <span id="user-name" style="font-weight:bold;">👤 </span>
            <button class="logout-btn" onclick="logout()">Keluar</button>
        </div>
        <div id="message-box"></div>
        <textarea id="message-input" rows="2" placeholder="Tulis pesan untuk seluruh santri..."></textarea>
        <button onclick="sendMessage()">Kirim Pesan</button>
    </div>
    <footer>Al Kautsar — Silaturahmi Digital</footer>
</div>

<!-- Parse JS SDK -->
<script src="https://unpkg.com/parse@3.4.0/dist/parse.min.js"></script>

<script>
    // ============================================================
    // KONFIGURASI YANG BENAR (Application ID + JavaScript Key)
    // ============================================================
    Parse.initialize("PUkWc1q1w6G9LObKVAM8vaZysalll29RGM6hUsCN", "rYurvOuqkeJzJZfT1Tq1X5UmbSQHC6StID85xCu7");
    Parse.serverURL = "https://parseapi.back4app.com/";

    let currentUser = null;

    // Fungsi pendaftaran
    async function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('login-message');

        if (!username || !password) {
            msgDiv.innerText = 'Username dan password harus diisi.';
            return;
        }
        if (password.length < 6) {
            msgDiv.innerText = 'Password minimal 6 karakter.';
            return;
        }

        const user = new Parse.User();
        user.set('username', username);
        user.set('password', password);

        try {
            await user.signUp();
            msgDiv.innerText = '✅ Pendaftaran berhasil! Silakan login.';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        } catch (err) {
            msgDiv.innerText = '❌ Gagal daftar: ' + err.message;
        }
    }

    // Fungsi login
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const msgDiv = document.getElementById('login-message');

        if (!username || !password) {
            msgDiv.innerText = 'Isi username dan password.';
            return;
        }

        try {
            const user = await Parse.User.logIn(username, password);
            currentUser = user;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            document.getElementById('user-name').innerHTML = '👤 ' + user.get('username');
            await loadMessages();
        } catch (err) {
            msgDiv.innerText = '❌ Login gagal: ' + err.message;
        }
    }

    // Logout
    async function logout() {
        await Parse.User.logOut();
        currentUser = null;
        document.getElementById('chat-area').style.display = 'none';
        document.getElementById('login-area').style.display = 'block';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('login-message').innerHTML = '';
    }

    // Kirim pesan
    async function sendMessage() {
        const text = document.getElementById('message-input').value.trim();
        if (!text) return;

        const Message = Parse.Object.extend('Message');
        const msg = new Message();
        msg.set('username', currentUser.get('username'));
        msg.set('text', text);

        try {
            await msg.save();
            document.getElementById('message-input').value = '';
        } catch (err) {
            alert('Gagal kirim pesan: ' + err.message);
        }
    }

    // Ambil pesan lama
    async function loadMessages() {
        const Message = Parse.Object.extend('Message');
        const query = new Parse.Query(Message);
        query.ascending('createdAt');
        try {
            const results = await query.find();
            displayMessages(results);
            subscribeToNewMessages();
        } catch (err) {
            console.error('Gagal ambil pesan:', err);
        }
    }

    // Tampilkan pesan di layar
    function displayMessages(messages) {
        const container = document.getElementById('message-box');
        container.innerHTML = '';
        for (let msg of messages) {
            appendMessage(msg);
        }
        container.scrollTop = container.scrollHeight;
    }

    // Tambah satu pesan ke container
    function appendMessage(msg) {
        const container = document.getElementById('message-box');
        const div = document.createElement('div');
        div.className = 'message';
        const waktu = new Date(msg.createdAt).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        div.innerHTML = `<strong>${escapeHtml(msg.get('username'))}</strong> <small>${waktu}</small><br>${escapeHtml(msg.get('text'))}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // Subscribe real-time (Live Query)
    function subscribeToNewMessages() {
        const Message = Parse.Object.extend('Message');
        const query = new Parse.Query(Message);
        const subscription = query.subscribe();
        subscription.on('create', (msg) => {
            appendMessage(msg);
        });
    }

    // Security
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Cek apakah sudah login saat load halaman
    window.onload = async () => {
        const user = Parse.User.current();
        if (user) {
            currentUser = user;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            document.getElementById('user-name').innerHTML = '👤 ' + user.get('username');
            await loadMessages();
        }
    };
</script>
</body>
  </html>
