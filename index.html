<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ponpes Al Kautsar - Dashboard Digital</title>
    <!-- Parse SDK -->
    <script src="https://unpkg.com/parse@3.4.0/dist/parse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #1e2a47 0%, #0f1a2e 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTAINER UTAMA */
        .app-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh; /* Tinggi aplikasi fix */
        }
        @media (max-width: 600px) {
            .app-container { height: 100vh; border-radius: 0; }
            body { padding: 0; }
        }

        /* HEADER */
        .header {
            background: #fff;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eef2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .logo h1 { font-size: 1.4rem; color: #1e2a47; margin: 0; }
        .logo p { font-size: 0.75rem; color: #e67e22; font-weight: bold; margin: 0; }
        
        .user-info { display: flex; gap: 10px; align-items: center; background: #f8f9fa; padding: 5px 15px; border-radius: 30px; }
        .user-info span { font-weight: bold; color: #1e2a47; font-size: 0.9rem; }
        .role-badge { background: #e67e22; color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        .logout-btn { background: none; border: none; color: #e67e22; font-weight: bold; cursor: pointer; font-size: 0.8rem; }

        /* MENU TABS */
        .menu-tabs {
            display: flex;
            background: #f8f9fa;
            padding: 0 1rem;
            gap: 0.5rem;
            border-bottom: 2px solid #eef2f7;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab {
            padding: 1rem 1.2rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
        }
        .tab.active { color: #1e2a47; border-bottom-color: #e67e22; }

        /* CONTENT AREA */
        .content {
            flex: 1;
            padding: 1.5rem;
            background: white;
            overflow-y: auto;
            position: relative;
        }
        .page { display: none; animation: fadeIn 0.3s ease; height: 100%; display: flex; flex-direction: column; }
        .page.active-page { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }

        /* --- AUTH FORMS --- */
        .auth-container { max-width: 360px; margin: 40px auto; text-align: center; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; color: #475569; font-size: 0.9rem; }
        input, select, textarea {
            width: 100%; padding: 0.7rem 1rem; border: 1px solid #cbd5e1; border-radius: 2rem; font-size: 0.95rem;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #e67e22; outline: none; background: #fff; }
        button {
            background: #1e2a47; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 2rem; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #e67e22; }
        .btn-secondary:hover { background: #d35400; }

        /* --- CHAT MODERN (Bubble) --- */
        .chat-wrapper { display: flex; flex-direction: column; height: 100%; }
        .chat-box {
            flex: 1;
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #e2e8f0;
        }
        
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }

        .msg-bubble {
            max-width: 75%;
            padding: 8px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-row.me .msg-bubble {
            background: #2c5a2e; /* Warna Hijau Pesantren */
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.other .msg-bubble {
            background: white;
            color: #2d3436;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .msg-info { font-size: 10px; display: block; margin-top: 4px; opacity: 0.7; text-align: right; }
        .msg-sender { font-weight: bold; font-size: 11px; display: block; margin-bottom: 2px; color: #1e2a47; }

        .chat-input-area {
            margin-top: 1rem;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .chat-input-area textarea { resize: none; height: 45px; border-radius: 20px; margin: 0; }
        .chat-input-area button { width: auto; margin: 0; padding: 0 20px; border-radius: 20px; }

        /* --- INFAK & PENGUMUMAN --- */
        .form-card { background: #fff7ed; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #ffedd5; margin-bottom: 1.5rem; }
        .infak-item { background: #f1f5f9; padding: 0.8rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #e67e22; }
        .pengumuman-card { background: #fff; border-left: 5px solid #e67e22; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .empty { text-align: center; color: #94a3b8; padding: 2rem; font-size: 0.9rem; }
        .alert { padding: 0.75rem; border-radius: 1rem; margin-bottom: 1rem; background: #fee2e2; color: #b91c1c; font-size: 0.9rem; }

        /* FOOTER */
        footer { text-align: center; font-size: 0.7rem; padding: 0.8rem; background: #f8f9fa; color: #94a3b8; border-top: 1px solid #eee; flex-shrink: 0; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    
    <!-- HEADER (Hanya muncul setelah login) -->
    <div class="header" id="header" style="display: none;">
        <div class="logo">
            <h1>🏫 Al Kautsar</h1>
            <p>Sistem Informasi Pesantren</p>
        </div>
        <div class="user-info">
            <span id="userName">User</span>
            <span class="role-badge" id="userRole">Role</span>
            <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
    </div>

    <!-- HALAMAN LOGIN/REGISTER -->
    <div id="authSection" class="content">
        <div class="auth-container">
            <h2 style="color: #1e2a47; margin-bottom: 0.5rem;">🌙 Al Kautsar</h2>
            <p style="color: #64748b; margin-bottom: 2rem;">Silakan masuk akun Anda</p>
            
            <div id="loginPanel">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button id="doLoginBtn">Masuk Dashboard</button>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                    Belum punya akun? <a href="#" id="showRegisterLink" style="color:#e67e22; text-decoration:none; font-weight:bold;">Daftar</a>
                </p>
                <div id="loginError" class="alert" style="display: none;"></div>
            </div>

            <div id="registerPanel" style="display: none;">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="regName">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="regRole">
                        <option value="wali_santri">👨‍👩‍👧 Wali Santri</option>
                        <option value="masul_mudarris">👨‍🏫 Mas'ul / Mudarris</option>
                        <option value="admin_murobbi">👩‍💼 Admin / Murobbi</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword">
                </div>
                <button class="btn-secondary" id="doRegisterBtn">Daftar Akun</button>
                <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                    Sudah punya akun? <a href="#" id="showLoginLink" style="color:#1e2a47; text-decoration:none; font-weight:bold;">Masuk</a>
                </p>
                <div id="regError" class="alert" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD CONTENT -->
    <div id="dashboardSection" style="display: none; flex: 1; display: flex; flex-direction: column;">
        <div class="menu-tabs" id="menuTabs"></div>
        
        <div class="content">
            <!-- 1. PAGE CHAT -->
            <div id="chatPage" class="page">
                <div class="chat-wrapper">
                    <div class="chat-box" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <textarea id="chatInput" placeholder="Tulis pesan..." rows="1"></textarea>
                        <button id="sendChatBtn">Kirim</button>
                    </div>
                </div>
            </div>

            <!-- 2. PAGE INFAK -->
            <div id="infakPage" class="page">
                <div class="form-card">
                    <h3 style="margin-bottom:1rem; color: #e67e22;">💰 Form Infak Bulanan</h3>
                    <div class="form-group">
                        <label>Bulan</label>
                        <input type="month" id="infakBulan">
                    </div>
                    <div class="form-group">
                        <label>Nominal (Rp)</label>
                        <input type="number" id="infakNominal" placeholder="Contoh: 100000">
                    </div>
                    <button class="btn-secondary" id="submitInfakBtn">Simpan Infak</button>
                    <div id="infakMessage" style="margin-top:10px; font-size:0.9rem;"></div>
                </div>
                <h4 style="margin-bottom:10px;">Riwayat Infak Saya</h4>
                <div id="infakRiwayat" style="flex:1; overflow-y:auto; padding-bottom:20px;"></div>
            </div>

            <!-- 3. PAGE PENGUMUMAN -->
            <div id="pengumumanPage" class="page">
                <div style="background:#f0f9ff; padding:1rem; border-radius:1.5rem; margin-bottom:1.5rem; border:1px solid #bae6fd;">
                    <h3 style="margin-bottom:1rem; color: #0284c7;">📢 Buat Pengumuman</h3>
                    <div class="form-group">
                        <label>Judul</label>
                        <input type="text" id="annTitle" placeholder="Contoh: Hafalan Juz 30">
                    </div>
                    <div class="form-group">
                        <label>Isi Pengumuman</label>
                        <textarea id="annDesc" rows="2" placeholder="Detail informasi..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Tampilkan Kepada</label>
                        <select id="annTarget">
                            <option value="all">Semua Pengguna</option>
                            <option value="me">Hanya Saya (Testing)</option>
                        </select>
                    </div>
                    <button id="createAnnouncementBtn" style="background:#0284c7;">Kirim Pengumuman</button>
                    <div id="annMessage" style="margin-top:10px; font-size:0.9rem;"></div>
                </div>
                <h4 style="margin-bottom:10px;">Papan Pengumuman</h4>
                <div id="announcementList" style="flex:1; overflow-y:auto; padding-bottom:20px;"></div>
            </div>
        </div>
        
        <footer>Al Kautsar — Silaturahmi Digital | © 2026</footer>
    </div>
</div>

<script>
    // KONFIGURASI PARSE (Gunakan Key terbaru)
    Parse.initialize("PUkWc1q1w6G9LObKVAM8vaZysalll29RGM6hUsCN", "rYurvOuqkeJzJZfT1Tq1X5UmbSQHC6StID85xCu7");
    Parse.serverURL = "https://parseapi.back4app.com/";

    // Variables
    const authSection = document.getElementById('authSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const header = document.getElementById('header');
    const loginPanel = document.getElementById('loginPanel');
    const registerPanel = document.getElementById('registerPanel');
    let currentUser = null;

    // --- AUTHENTICATION ---
    
    function showError(divId, msg) {
        const div = document.getElementById(divId);
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 4000);
    }

    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const role = document.getElementById('regRole').value;
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!name || !username || !password) return showError('regError', 'Semua field harus diisi');
        if (password.length < 6) return showError('regError', 'Password minimal 6 karakter');

        const user = new Parse.User();
        user.set('username', username);
        user.set('password', password);
        user.set('name', name);
        user.set('role', role);

        try {
            await user.signUp();
            alert('Pendaftaran berhasil! Silakan login.');
            document.getElementById('showLoginLink').click();
        } catch(err) { showError('regError', err.message); }
    });

    document.getElementById('doLoginBtn').addEventListener('click', async () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showError('loginError', 'Isi username dan password');
        try {
            const user = await Parse.User.logIn(username, password);
            currentUser = user;
            showDashboard();
        } catch(err) { showError('loginError', err.message); }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await Parse.User.logOut();
        location.reload();
    });

    document.getElementById('showRegisterLink').addEventListener('click', (e) => { e.preventDefault(); loginPanel.style.display='none'; registerPanel.style.display='block'; });
    document.getElementById('showLoginLink').addEventListener('click', (e) => { e.preventDefault(); registerPanel.style.display='none'; loginPanel.style.display='block'; });

    // --- DASHBOARD LOGIC ---

    async function showDashboard() {
        authSection.style.display = 'none';
        dashboardSection.style.display = 'flex'; // Flex agar layout bener
        header.style.display = 'flex';
        
        const user = Parse.User.current();
        document.getElementById('userName').innerText = user.get('name') || user.get('username');
        
        const role = user.get('role');
        let roleText = 'Santri';
        if (role === 'wali_santri') roleText = 'Wali Santri';
        else if (role === 'masul_mudarris') roleText = 'Mas’ul / Mudarris';
        else if (role === 'admin_murobbi') roleText = 'Admin / Murobbi';
        document.getElementById('userRole').innerText = roleText;

        setupTabs();
        await loadChat();
        await loadInfak();
        await loadPengumuman();
    }

    function setupTabs() {
        const container = document.getElementById('menuTabs');
        container.innerHTML = '';
        const menus = [
            { id: 'chatPage', name: '💬 Chat Forum' },
            { id: 'infakPage', name: '💰 Infak' },
            { id: 'pengumumanPage', name: '📢 Pengumuman' }
        ];
        menus.forEach((menu, index) => {
            const tab = document.createElement('div');
            tab.className = 'tab' + (index === 0 ? ' active' : '');
            tab.innerText = menu.name;
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(menu.id).classList.add('active-page');
            };
            container.appendChild(tab);
        });
        document.getElementById('chatPage').classList.add('active-page');
    }

    // --- CHAT (Modern Bubble) ---

    async function loadChat() {
        const Message = Parse.Object.extend('Message');
        const query = new Parse.Query(Message);
        query.ascending('createdAt');
        query.limit(100);
        try {
            const results = await query.find();
            renderChat(results);
            subscribeChat();
        } catch(e) { console.error(e); }
    }

    function renderChat(messages) {
        const container = document.getElementById('chatMessages');
        container.innerHTML = '';
        messages.forEach(m => appendChatMessage(m));
        container.scrollTop = container.scrollHeight;
    }

    function appendChatMessage(msg) {
        const container = document.getElementById('chatMessages');
        const user = Parse.User.current();
        const isMe = msg.get('username') === user.get('username');
        const waktu = new Date(msg.createdAt).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

        const row = document.createElement('div');
        row.className = isMe ? 'msg-row me' : 'msg-row other';

        let html = '';
        if (!isMe) html += `<span class="msg-sender">${escapeHtml(msg.get('username'))}</span>`;
        html += `${escapeHtml(msg.get('text'))}`;
        html += `<span class="msg-info">${waktu}</span>`;

        row.innerHTML = `<div class="msg-bubble">${html}</div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function subscribeChat() {
        const Message = Parse.Object.extend('Message');
        const query = new Parse.Query(Message);
        query.subscribe().on('create', (msg) => { appendChatMessage(msg); });
    }

    document.getElementById('sendChatBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        const user = Parse.User.current();
        const Message = Parse.Object.extend('Message');
        const msg = new Message();
        msg.set('username', user.get('username'));
        msg.set('text', text);
        try {
            await msg.save();
            input.value = '';
        } catch(err) { alert('Gagal kirim: ' + err.message); }
    }

    // --- INFAK ---
    async function loadInfak() {
        const user = Parse.User.current();
        const Infak = Parse.Object.extend('Infak');
        const query = new Parse.Query(Infak);
        query.equalTo('userId', user.id);
        query.descending('createdAt');
        try {
            const results = await query.find();
            const container = document.getElementById('infakRiwayat');
            if (results.length === 0) { container.innerHTML = '<div class="empty">Belum ada riwayat infak.</div>'; return; }
            let html = '';
            results.forEach(r => {
                html += `<div class="infak-item">
                            <div>
                                <div style="font-weight:bold; color:#1e2a47;">${escapeHtml(r.get('bulan'))}</div>
                                <small style="color:#64748b;">${new Date(r.createdAt).toLocaleDateString('id-ID')}</small>
                            </div>
                            <div style="font-weight:bold; color:#e67e22;">Rp ${r.get('nominal').toLocaleString('id-ID')}</div>
                         </div>`;
            });
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    document.getElementById('submitInfakBtn').addEventListener('click', async () => {
        const bulan = document.getElementById('infakBulan').value;
        const nominal = parseInt(document.getElementById('infakNominal').value);
        if (!bulan || isNaN(nominal) || nominal <= 0) return alert('Data tidak valid');
        const user = Parse.User.current();
        const Infak = Parse.Object.extend('Infak');
        const infak = new Infak();
        infak.set('userId', user.id);
        infak.set('username', user.get('username'));
        infak.set('bulan', bulan);
        infak.set('nominal', nominal);
        try {
            await infak.save();
            document.getElementById('infakMessage').innerHTML = '<span style="color:green">✅ Tersimpan!</span>';
            document.getElementById('infakBulan').value = '';
            document.getElementById('infakNominal').value = '';
            loadInfak();
        } catch(err) { alert('Gagal: ' + err.message); }
    });

    // --- PENGUMUMAN ---
    async function loadPengumuman() {
        const user = Parse.User.current();
        const Announcement = Parse.Object.extend('Announcement');
        const q1 = new Parse.Query(Announcement); q1.equalTo('forAll', true);
        const q2 = new Parse.Query(Announcement); q2.equalTo('targetUserId', user.id);
        const query = Parse.Query.or(q1, q2);
        query.descending('createdAt');
        try {
            const results = await query.find();
            const container = document.getElementById('announcementList');
            if (results.length === 0) { container.innerHTML = '<div class="empty">Belum ada pengumuman.</div>'; return; }
            let html = '';
            results.forEach(a => {
                const date = new Date(a.createdAt).toLocaleDateString('id-ID', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
                html += `<div class="pengumuman-card">
                            <h3 style="color:#e67e22; margin-bottom:5px;">${escapeHtml(a.get('title'))}</h3>
                            <p style="color:#334155; line-height:1.5;">${escapeHtml(a.get('description'))}</p>
                            <div style="margin-top:10px; font-size:0.8rem; color:#94a3b8; border-top:1px solid #eee; padding-top:5px;">
                                👤 ${escapeHtml(a.get('createdBy'))} | 📅 ${date}
                            </div>
                         </div>`;
            });
            container.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    document.getElementById('createAnnouncementBtn').addEventListener('click', async () => {
        const title = document.getElementById('annTitle').value.trim();
        const desc = document.getElementById('annDesc').value.trim();
        const target = document.getElementById('annTarget').value;
        if (!title || !desc) return alert('Lengkapi judul dan isi');
        const user = Parse.User.current();
        const Announcement = Parse.Object.extend('Announcement');
        const ann = new Announcement();
        ann.set('title', title);
        ann.set('description', desc);
        ann.set('createdBy', user.get('username'));
        ann.set('forAll', (target === 'all'));
        ann.set('targetUserId', (target === 'all' ? null : user.id));
        try {
            await ann.save();
            document.getElementById('annMessage').innerHTML = '<span style="color:blue">✅ Terkirim!</span>';
            document.getElementById('annTitle').value = '';
            document.getElementById('annDesc').value = '';
            loadPengumuman();
        } catch(err) { alert('Gagal: ' + err.message); }
    });

    // UTILITIES
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#039;';
            return m;
        });
    }

    // INIT
    (async () => {
        const user = Parse.User.current();
        if (user) { currentUser = user; showDashboard(); }
    })();
</script>
